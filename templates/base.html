<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}3D Carpenter | Bespoke Woodworking{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">

<body>

    {% include 'components/footer.html' %}

        <a href="tel:+917088051197" class="float-btn float-phone" aria-label="Call Now">📞</a>
        <a href="https://wa.me/917088051197" class="float-btn float-wa" aria-label="WhatsApp Us">💬</a>

    {% block extra_js %}{% endblock %}
