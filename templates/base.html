<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="3D Carpenter - Premium bespoke woodworking and custom furniture services in New Delhi. Specializing in kitchen cabinetry, wardrobes, doors, and luxury wood interiors.">
    <meta name="keywords" content="custom furniture New Delhi, best carpenter Delhi, bespoke woodworking India, kitchen cabinetry New Delhi, custom wooden doors Delhi, 3D Carpenter Delhi, professional carpentry services Delhi, wood polishing New Delhi">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="3D Carpenter | Bespoke Woodworking & Custom Furniture in New Delhi">
    <meta property="og:description" content="Master woodworkers crafting bespoke furniture, luxury cabinetry, and fine joinery in New Delhi. 25+ years of excellence.">
    <meta property="og:image" content="{{ url_for('static', filename='img/3d-carpenter-logo.png', _external=True) }}">

    <!-- Schema.org LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "3D Carpenter",
      "image": "{{ url_for('static', filename='img/3d-carpenter-logo.png', _external=True) }}",
      "telephone": "+91-70880-51197",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "70 A, Pocket A 14, Himgiri Apartments",
        "addressLocality": "New Delhi",
        "postalCode": "110019",
        "addressCountry": "IN"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "08:00",
          "closes": "18:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "09:00",
          "closes": "15:00"
        }
      ]
    }
    </script>

    <title>{% block title %}3D Carpenter | Bespoke Woodworking & Custom Furniture New Delhi{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/favicons/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicons/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicons/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='img/favicons/site.webmanifest') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicons/favicon.ico') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'components/navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    <div class="floating-actions">
        <a href="tel:+917088051197" class="float-btn float-phone" aria-label="Call Now"><i class="fa-solid fa-phone"></i></a>
        <a href="https://wa.me/917088051197" class="float-btn float-wa" aria-label="WhatsApp Us"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
